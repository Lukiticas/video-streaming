worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # Serve frontend
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        # Internal Authentication Endpoint
        location = /v1/auth {
            internal;
            proxy_pass http://api:8080/v1/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Forward the Authorization header from the browser directly to the API
            proxy_pass_request_headers on;
        }

        # Serve thumbnails and sprite sheets without authentication
        location ~ ^/processed/.*\.(jpg|vtt)$ {
            proxy_pass http://varnish:80;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Accept, Content-Type, Authorization, X-Requested-With' always;
        }

        # Serve processed videos from Varnish Cache (which fetches from MinIO)
        location /processed/ {
            # Handle CORS Preflight quickly without hitting Auth
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Allow-Headers 'Origin, Accept, Content-Type, Authorization, X-Requested-With';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain charset=UTF-8';
                add_header Content-Length 0;
                return 204;
            }

            # 1. Ask the internal Auth API if this is allowed
            auth_request /v1/auth;
            
            # 2. If it is 200 OK, continue to Varnish
            proxy_pass http://varnish:80;
            
            # Handle CORS for HLS Streaming responses
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Accept, Content-Type, Authorization, X-Requested-With' always;
        }
    }
}
